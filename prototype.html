<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CloudMux 原型图</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#080b11;--sb:#0b0f17;--nv:#0d1220;--cd:#111827;
  --hv:rgba(99,144,255,.055);--at:rgba(99,144,255,.11);
  --bd:rgba(255,255,255,.04);--bd2:rgba(255,255,255,.07);
  --t1:#dfe3ed;--t2:#7e89a4;--t3:#525d78;--t4:#3a4260;
  --ac:#6490ff;--ac2:#8bb2ff;--gl:rgba(99,144,255,.22);
  --gn:#34d399;--og:#fbbf24;--rd:#f87171;--pp:#a78bfa;--cy:#22d3ee;
  --sw:256px;--nh:52px;--r:10px;--rs:6px
}
html,body{height:100%;overflow:hidden}
body{font-family:-apple-system,"Segoe UI","Helvetica Neue",sans-serif;background:var(--bg);color:var(--t1);font-size:13px;-webkit-font-smoothing:antialiased}
.W{display:flex;height:100vh}
.S{width:var(--sw);background:var(--sb);border-right:1px solid var(--bd);display:flex;flex-direction:column;flex-shrink:0}
.S-logo{height:52px;display:flex;align-items:center;padding:0 18px;gap:10px;border-bottom:1px solid var(--bd);cursor:pointer}
.S-logo svg{width:26px;height:26px}
.S-logo b{font-size:15px;font-weight:700;background:linear-gradient(135deg,#6490ff,#a78bfa);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.S-nav{flex:1;overflow-y:auto;padding:4px 0 24px;scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.06) transparent}
.S-nav::-webkit-scrollbar{width:3px}.S-nav::-webkit-scrollbar-thumb{background:rgba(255,255,255,.07);border-radius:3px}
.S-ft{border-top:1px solid var(--bd);padding:8px}
.S-ft div{height:34px;display:flex;align-items:center;justify-content:center;border-radius:var(--rs);cursor:pointer;color:var(--t3);transition:.15s}
.S-ft div:hover{background:var(--hv);color:var(--t1)}
.G{margin-bottom:2px}
.G-t{padding:14px 18px 5px;font-size:10px;font-weight:700;text-transform:uppercase;color:var(--t4);letter-spacing:1.2px}
.M.child-active{color:var(--t1)}
.L2-i.child-active{color:var(--t1)}

/* === MAIN === */
.MA{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.NB{height:var(--nh);background:var(--nv);border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;padding:0 20px;flex-shrink:0}
.NB-l,.NB-r{display:flex;align-items:center;gap:12px}
.NB .btn{width:32px;height:32px;display:flex;align-items:center;justify-content:center;border-radius:var(--rs);cursor:pointer;color:var(--t3);transition:.12s;position:relative}
.NB .btn:hover{background:var(--hv);color:var(--t1)}
.NB .btn svg{width:17px;height:17px}
.badge{position:absolute;top:5px;right:5px;width:7px;height:7px;background:var(--rd);border-radius:50%;border:1.5px solid var(--nv)}
.bc{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--t3)}
.bc .cur{color:var(--t1)}
.bc .sep{opacity:.4}
.srch{display:flex;align-items:center;background:rgba(255,255,255,.025);border:1px solid var(--bd2);border-radius:8px;padding:0 10px;height:32px;width:260px;gap:7px;cursor:text}
.srch svg{width:14px;height:14px;stroke:var(--t3);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}
.srch em{font-style:normal;color:var(--t4);font-size:12px;flex:1}
.srch kbd{font-size:10px;color:var(--t4);background:rgba(255,255,255,.04);padding:1px 5px;border-radius:3px;font-family:monospace;border:1px solid var(--bd)}
.tn{display:flex;align-items:center;gap:6px;background:rgba(255,255,255,.025);border:1px solid var(--bd2);border-radius:var(--rs);padding:0 10px;height:32px;font-size:12px;color:var(--t2);cursor:pointer}
.tn svg{width:15px;height:15px;stroke:var(--ac);fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.av{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,#6490ff,#a78bfa);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:#fff;cursor:pointer}
.proto{position:fixed;top:10px;right:10px;background:rgba(248,113,113,.1);color:var(--rd);font-size:10px;font-weight:700;padding:3px 10px;border-radius:20px;border:1px solid rgba(248,113,113,.2);z-index:999;letter-spacing:.8px}

/* === CONTENT === */
.CT{flex:1;overflow-y:auto;padding:22px 26px;background:var(--bg)}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}
.st{background:var(--cd);border:1px solid var(--bd);border-radius:var(--r);padding:18px 20px;transition:.2s;position:relative;overflow:hidden}
.st:hover{border-color:var(--bd2);transform:translateY(-1px)}
.st-l{font-size:11.5px;color:var(--t2);margin-bottom:8px}
.st-v{font-size:26px;font-weight:700;letter-spacing:-.5px}
.st-c{font-size:11px;margin-top:6px}.st-c.up{color:var(--gn)}.st-c.dn{color:var(--rd)}.st-c.wn{color:var(--og)}
.charts{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:20px}
.ch{background:var(--cd);border:1px solid var(--bd);border-radius:var(--r);padding:18px 20px}
.ch-t{font-size:13px;font-weight:600;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between}
.ch-t small{font-size:11px;color:var(--t3);font-weight:400}
.line-ch{height:180px;position:relative;overflow:hidden;border-radius:var(--rs)}
.line-ch .grid{position:absolute;inset:0;background:repeating-linear-gradient(90deg,rgba(255,255,255,.015) 0 1px,transparent 1px 60px),repeating-linear-gradient(0deg,rgba(255,255,255,.015) 0 1px,transparent 1px 36px)}
.line-ch .area{position:absolute;bottom:0;left:0;right:0;height:70%}
.line-ch .area svg{width:100%;height:100%}
.donut-wrap{display:flex;align-items:center;gap:24px;padding:10px 0}
.donut{width:140px;height:140px;border-radius:50%;background:conic-gradient(var(--ac) 0deg 130deg,var(--pp) 130deg 210deg,var(--gn) 210deg 280deg,var(--og) 280deg 330deg,var(--cy) 330deg 360deg);position:relative;flex-shrink:0}
.donut::after{content:"";position:absolute;inset:28px;background:var(--cd);border-radius:50%}
.donut-info{display:flex;flex-direction:column;gap:8px}
.donut-info div{display:flex;align-items:center;gap:8px;font-size:11.5px;color:var(--t2)}
.donut-info div::before{content:"";width:8px;height:8px;border-radius:2px;flex-shrink:0}
.donut-info div:nth-child(1)::before{background:var(--ac)}.donut-info div:nth-child(2)::before{background:var(--pp)}.donut-info div:nth-child(3)::before{background:var(--gn)}.donut-info div:nth-child(4)::before{background:var(--og)}.donut-info div:nth-child(5)::before{background:var(--cy)}
.donut-info b{color:var(--t1);font-weight:600;margin-left:auto;font-size:12px}
.bars{display:flex;align-items:flex-end;gap:8px;height:160px;padding-top:10px}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
.bar-col .b{width:100%;border-radius:4px 4px 0 0;min-height:4px}
.bar-col small{font-size:9.5px;color:var(--t4)}
.tbl{width:100%;border-collapse:collapse}
.tbl th{text-align:left;font-size:11px;font-weight:600;color:var(--t3);padding:8px 12px;border-bottom:1px solid var(--bd)}
.tbl td{font-size:12px;color:var(--t2);padding:10px 12px;border-bottom:1px solid var(--bd)}
.tbl tr:hover td{background:var(--hv)}
.tag{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10.5px;font-weight:500}
.tag-b{background:rgba(99,144,255,.12);color:var(--ac)}.tag-g{background:rgba(52,211,153,.12);color:var(--gn)}.tag-o{background:rgba(251,191,36,.12);color:var(--og)}.tag-r{background:rgba(248,113,113,.12);color:var(--rd)}.tag-p{background:rgba(167,139,250,.12);color:var(--pp)}

/* Page header */
.ph{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:20px;padding:20px 24px;background:var(--cd);border:1px solid var(--bd);border-radius:var(--r)}
.ph h1{font-size:20px;font-weight:700;margin-bottom:4px}
.ph p{font-size:12.5px;color:var(--t2)}
.ph-stats{display:flex;gap:24px}
.ph-st{text-align:center}
.ph-st-v{font-size:22px;font-weight:700}
.ph-st-l{font-size:11px;color:var(--t3);margin-top:2px}

/* Toolbar */
.tb{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;gap:12px}
.tb-left{display:flex;align-items:center;gap:12px}
.tb-left h2{font-size:14px;font-weight:600;white-space:nowrap}
.tb-right{display:flex;align-items:center;gap:8px}
.tb-filters{display:flex;gap:6px}
.tb-sel{display:flex;align-items:center;gap:4px;background:var(--cd);border:1px solid var(--bd);border-radius:var(--rs);padding:0 10px;height:30px;font-size:11.5px;color:var(--t2);cursor:pointer}
.tb-sel:hover{border-color:var(--bd2)}
.tb-btn{display:flex;align-items:center;gap:5px;background:var(--cd);border:1px solid var(--bd);border-radius:var(--rs);padding:0 12px;height:30px;font-size:11.5px;color:var(--t2);cursor:pointer;white-space:nowrap}
.tb-btn:hover{border-color:var(--bd2);color:var(--t1)}
.tb-btn.primary{background:var(--ac);border-color:var(--ac);color:#fff}
.tb-btn.primary:hover{opacity:.9}
.tb-btn svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.tb-search{display:flex;align-items:center;gap:6px;background:var(--cd);border:1px solid var(--bd);border-radius:var(--rs);padding:0 10px;height:30px}
.tb-search svg{width:13px;height:13px;stroke:var(--t3);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.tb-search input{background:none;border:none;outline:none;color:var(--t1);font-size:11.5px;width:120px}
.tb-search input::placeholder{color:var(--t4)}

/* Pager */
.pager{display:flex;align-items:center;justify-content:space-between;margin-top:14px;padding:8px 0}
.pg-info{font-size:11.5px;color:var(--t3)}
.pg-btns{display:flex;gap:4px}
.pg-btn{width:28px;height:28px;display:flex;align-items:center;justify-content:center;border-radius:var(--rs);font-size:11.5px;color:var(--t2);cursor:pointer;border:1px solid var(--bd)}
.pg-btn:hover{border-color:var(--bd2);color:var(--t1)}
.pg-btn.on{background:var(--ac);border-color:var(--ac);color:#fff}

/* Progress */
.progress{width:100%;height:6px;background:rgba(255,255,255,.05);border-radius:3px;overflow:hidden}
.progress-bar{height:100%;background:var(--ac);border-radius:3px;transition:.3s}
.progress-bar.warn{background:var(--og)}
.progress-bar.err{background:var(--rd)}

/* Card grid */
.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}
.model-card{display:flex;align-items:center;gap:14px;background:var(--cd);border:1px solid var(--bd);border-radius:var(--r);padding:16px 18px;cursor:pointer;transition:.15s}
.model-card:hover{border-color:var(--bd2);transform:translateY(-1px)}
.mc-icon{width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.mc-name{font-size:13px;font-weight:600;margin-bottom:3px}
.mc-meta{font-size:11px;color:var(--t3)}

/* Account cards */
.account-card{background:var(--cd);border:1px solid var(--bd);border-radius:var(--r);padding:18px 20px;cursor:pointer;transition:.15s}
.account-card:hover{border-color:var(--bd2);transform:translateY(-1px)}
.ac-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.ac-provider{font-size:11px;font-weight:600;padding:2px 8px;border-radius:4px}
.ac-provider.ali{background:rgba(255,106,0,.12);color:#ff6a00}
.ac-provider.aws{background:rgba(255,153,0,.12);color:#ff9900}
.ac-provider.tc{background:rgba(0,130,255,.12);color:#0082ff}
.ac-provider.hw{background:rgba(207,0,15,.12);color:#cf000f}
.ac-name{font-size:14px;font-weight:600;margin-bottom:4px}
.ac-desc{font-size:11.5px;color:var(--t3);margin-bottom:10px}
.ac-stats{display:flex;gap:12px;font-size:11px;color:var(--t2)}

/* Tree view */
.tree-view{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.tree-card{background:var(--cd);border:1px solid var(--bd);border-radius:var(--r);padding:18px 20px}
.tree-node{padding:8px 12px;font-size:13px;border-radius:var(--rs);display:flex;align-items:center;gap:8px}
.tree-node.root{font-weight:600;font-size:14px;margin-bottom:4px}
.tree-children{padding-left:20px;border-left:1px solid var(--bd);margin-left:12px}
.tree-children .tree-node{cursor:pointer;transition:.12s}
.tree-children .tree-node:hover{background:var(--hv)}
.tree-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.tree-count{margin-left:auto;font-size:11px;color:var(--t3)}

/* Dict layout */
.dict-layout{display:grid;grid-template-columns:240px 1fr;gap:14px}
.dict-left{background:var(--cd);border:1px solid var(--bd);border-radius:var(--r);padding:12px 0;overflow-y:auto}
.dict-header{padding:8px 16px;font-size:12px;font-weight:600;color:var(--t3);border-bottom:1px solid var(--bd);margin-bottom:4px}
.dict-item{padding:8px 16px;font-size:12.5px;color:var(--t2);cursor:pointer;transition:.12s;display:flex;justify-content:space-between}
.dict-item:hover{background:var(--hv);color:var(--t1)}
.dict-item.on{color:var(--ac);background:var(--at)}
.dict-item small{color:var(--t4);font-size:11px}
.dict-right{background:var(--cd);border:1px solid var(--bd);border-radius:var(--r);padding:18px 20px}

/* Topology */
.topo-placeholder{position:relative;height:440px;background:var(--cd);border:1px solid var(--bd);border-radius:var(--r);overflow:hidden}
.topo-node{position:absolute;padding:12px 18px;border:1.5px solid var(--bd2);border-radius:var(--r);font-size:12.5px;text-align:center;line-height:1.5;background:var(--cd);z-index:2}
.topo-node small{color:var(--t3);font-size:10.5px}
.topo-line{position:absolute;width:1px;background:var(--bd2);z-index:1}
.topo-row{position:absolute;left:0;right:0;display:flex;justify-content:center;gap:40px}

/* Empty page */
.empty-page{display:flex;flex-direction:column;align-items:center;justify-content:center;height:60vh;color:var(--t3)}
.empty-icon{font-size:48px;margin-bottom:16px;opacity:.5}
.empty-text{font-size:18px;font-weight:600;margin-bottom:6px;color:var(--t2)}
.empty-desc{font-size:13px}
</style>
</head>

function ico(name,size=17){return `<svg viewBox="0 0 24 24" width="${size}" height="${size}" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">${icons[name]||''}</svg>`;}
// ===== PAGE CONTENT GENERATORS =====
// Helper: stat card
function statCard(label,value,color,change,dir){
  return `<div class="st"><div class="st-l">${label}</div><div class="st-v" style="color:var(--${color})">${value}</div><div class="st-c ${dir}">${change}</div></div>`;
}
// Helper: table
function tbl(cols,rows){
  let h=cols.map(c=>`<th>${c}</th>`).join('');
  let b=rows.map(r=>`<tr>${r.map((c,i)=>`<td${i===0?' style="color:var(--t1)"':''}>${c}</td>`).join('')}</tr>`).join('');
  return `<table class="tbl"><thead><tr>${h}</tr></thead><tbody>${b}</tbody></table>`;
}
// Helper: tag
function tg(text,type){return `<span class="tag tag-${type}">${text}</span>`;}
// Helper: toolbar
function toolbar(title,btns,filters){
  let fb=filters?`<div class="tb-filters">${filters.map(f=>`<div class="tb-sel">${f} <span style="opacity:.4;font-size:10px">▾</span></div>`).join('')}</div>`:'';
  let bb=btns?btns.map(b=>`<div class="tb-btn${b.primary?' primary':''}">${b.icon?ico(b.icon,14)+' ':''}${b.label}</div>`).join(''):'';
  return `<div class="tb"><div class="tb-left"><h2>${title}</h2>${fb}</div><div class="tb-right"><div class="tb-search">${ico('search',14)}<input placeholder="搜索..." /></div>${bb}</div></div>`;
}
// Helper: page header with stats
function pageHeader(title,desc,stats){
  let s=stats?`<div class="ph-stats">${stats.map(s=>`<div class="ph-st"><div class="ph-st-v" style="color:var(--${s.color||'ac'})">${s.value}</div><div class="ph-st-l">${s.label}</div></div>`).join('')}</div>`:'';
  return `<div class="ph"><div><h1>${title}</h1><p>${desc}</p></div>${s}</div>`;
}

// ===== STATE =====
let currentPage = 'dashboard';
let expanded = new Set(['assets','svc-tree','host','storage','network','database','middleware']);

// ===== BREADCRUMB =====
function getBreadcrumb(id){
  const bc=[{label:'首页',id:'dashboard'}];
  for(const g of menu){
    for(const item of g.items){
      if(item.id===id){bc.push({label:item.label,id:item.id});return bc;}
      if(item.children){
        for(const c of item.children){
          if(c.id===id){bc.push({label:item.label});bc.push({label:c.label,id:c.id});return bc;}
          if(c.children){
            for(const gc of c.children){
              if(gc.id===id){bc.push({label:item.label});bc.push({label:c.label});bc.push({label:gc.label,id:gc.id});return bc;}
            }
          }
        }
      }
    }
  }
  return bc;
}

function getLabel(id){
  for(const g of menu) for(const i of g.items){
    if(i.id===id) return i.label;
    if(i.children) for(const c of i.children){
      if(c.id===id) return c.label;
      if(c.children) for(const gc of c.children) if(gc.id===id) return gc.label;
    }
  }
  return id;
}

// ===== RENDER =====
function render(){
  const app=document.getElementById('app');
  const bc=getBreadcrumb(currentPage);
  const bcHtml=bc.map((b,i)=>`<span class="${i===bc.length-1?'cur':''}" ${b.id?`onclick="nav('${b.id}')" style="cursor:pointer"`:''} >${b.label}</span>`).join('<span class="sep">/</span>');

  app.innerHTML=`
  <div class="proto">PROTOTYPE</div>
  <aside class="S">
    <div class="S-logo" onclick="nav('dashboard')">
      <svg viewBox="0 0 24 24" fill="none"><path d="M12 2L2 7l10 5 10-5L12 2Z" fill="#6490ff"/><path d="M2 17l10 5 10-5" stroke="#a78bfa" stroke-width="2" stroke-linecap="round"/><path d="M2 12l10 5 10-5" stroke="#6490ff" stroke-width="2" stroke-linecap="round"/></svg>
      <b>CloudMux</b>
    </div>
    <nav class="S-nav">${renderMenu()}</nav>
    <div class="S-ft"><div>⚙</div></div>
  </aside>
  <div class="MA">
    <header class="NB">
      <div class="NB-l">
        <div class="btn">${ico('grid',17)}</div>
        <div class="bc">${bcHtml}</div>
        <div class="srch">${ico('search',14)}<em>搜索资产、IP、实例ID...</em><kbd>⌘K</kbd></div>
      </div>
      <div class="NB-r">
        <div class="tn">${ico('cloud',15)} 默认租户 <span style="opacity:.35;font-size:10px">▾</span></div>
        <div class="btn">${ico('bell',17)}<span class="badge"></span></div>
        <div class="btn">${ico('grid',17)}</div>
        <div class="av">A</div>
      </div>
    </header>
    <div class="CT">${(pages[currentPage]||defaultPage)()}</div>
  </div>`;
}

function defaultPage(){
  return `<div class="empty-page"><div class="empty-icon">🚧</div><div class="empty-text">页面建设中</div><div class="empty-desc">${getLabel(currentPage)} 功能正在开发中</div></div>`;
}
// ===== MENU RENDER =====
function renderMenu(){
  let html='';
  for(const g of menu){
    html+=`<div class="G"><div class="G-t">${g.group}</div>`;
    for(const item of g.items) html+=renderL1(item);
    html+=`</div>`;
  }
  return html;
}

function renderL1(item){
  if(item.children){
    const ex=expanded.has(item.id);
    const hasActive=isChildActive(item);
    let h=`<div class="M${ex?' ex':''}${hasActive?' child-active':''}" onclick="toggle('${item.id}')">${ico(item.icon||'grid')} <span>${item.label}</span><i>▸</i></div>`;
    h+=`<div class="L2${ex?'':' h'}">`;
    for(const c of item.children) h+=renderL2(c);
    h+=`</div>`;
    return h;
  }
  return `<div class="M${currentPage===item.id?' on':''}" onclick="nav('${item.id}')">${ico(item.icon||'grid')} <span>${item.label}</span></div>`;
}

function renderL2(item){
  if(item.disabled) return `<div class="L2-i" style="opacity:.35;cursor:default">${ico(item.icon||'grid',15)} <span>${item.label}</span></div>`;
  if(item.children){
    const ex=expanded.has(item.id);
    const hasActive=isChildActive(item);
    let h=`<div class="L2-i${ex?' ex':''}${hasActive?' child-active':''}" onclick="toggle('${item.id}')">${ico(item.icon||'grid',15)} <span>${item.label}</span><i>▸</i></div>`;
    h+=`<div class="L3${ex?'':' h'}">`;
    for(const gc of item.children) h+=`<div class="L3-i${currentPage===gc.id?' on':''}" onclick="event.stopPropagation();nav('${gc.id}')">${gc.label}</div>`;
    h+=`</div>`;
    return h;
  }
  return `<div class="L2-i${currentPage===item.id?' on':''}" onclick="event.stopPropagation();nav('${item.id}')"><div class="dot"></div><span>${item.label}</span></div>`;
}

function isChildActive(item){
  if(!item.children) return item.id===currentPage;
  return item.children.some(c=>c.id===currentPage||(c.children&&c.children.some(gc=>gc.id===currentPage)));
}

// ===== NAV =====
function nav(id){
  currentPage=id;
  // auto expand parents
  for(const g of menu) for(const item of g.items){
    if(item.children) for(const c of item.children){
      if(c.children) for(const gc of c.children){
        if(gc.id===id){expanded.add(item.id);expanded.add(c.id);}
      }
      if(c.id===id) expanded.add(item.id);
    }
  }
  render();
  document.querySelector('.CT').scrollTop=0;
}

function toggle(id){
  if(expanded.has(id)) expanded.delete(id); else expanded.add(id);
  render();
}

// ===== INIT =====
render();
</script>

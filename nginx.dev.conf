# 开发环境统一入口 nginx 配置（Windows）
# 用法:
#   1. 复制此文件到 nginx 安装目录的 conf/ 下
#   2. 在 nginx 安装目录运行: start /B nginx -c conf/nginx.dev.conf
#   3. 停止: nginx -s stop
#   4. 重载: nginx -s reload

worker_processes 1;

events {
    worker_connections 1024;
}

http {
    include       E:/soft/nginx-1.25.4/conf/mime.types;
    default_type  application/octet-stream;

    # 开启 debug 日志
    access_log  E:/soft/nginx-1.25.4/logs/dev-access.log;
    error_log   E:/soft/nginx-1.25.4/logs/dev-error.log debug;

    server {
        listen 8888;
        server_name localhost;

        # ecmdb API: /api/cmdb/* -> ecmdb 后端 /api/*
        location ^~ /api/cmdb/ {
            proxy_pass http://127.0.0.1:8000/api/;
            proxy_set_header Host $host;
            proxy_set_header Authorization $http_authorization;
        }

        # e-cam-service API: /api/v1/cam/* -> e-cam-service
        location ^~ /api/v1/cam/ {
            proxy_pass http://127.0.0.1:8001;
            proxy_set_header Host $host;
            proxy_set_header Authorization $http_authorization;
            proxy_set_header X-Tenant-ID $http_x_tenant_id;
        }

        # e-cam-web 前端 (vite dev server)
        location ^~ /cam/ {
            proxy_pass http://127.0.0.1:5173/cam/;
            proxy_set_header Host $host;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # ecmdb-web 前端 (本地 dev server :3333)
        location / {
            proxy_pass http://127.0.0.1:3333;
            proxy_set_header Host $host;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
